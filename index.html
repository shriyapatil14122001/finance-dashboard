<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Finance Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

<header>
    <h2>💰 Finance Dashboard</h2>

    <div>
        <select id="role">
            <option value="viewer">Viewer</option>
            <option value="admin">Admin</option>
        </select>

        <button onclick="toggleDarkMode()">🌙</button>
    </div>
</header>

<!-- Cards -->
<section class="cards">
    <div class="card">Balance: ₹<span id="balance">0</span></div>
    <div class="card">Income: ₹<span id="income">0</span></div>
    <div class="card">Expense: ₹<span id="expense">0</span></div>
</section>

<!-- Charts -->
<section class="charts">
    <div class="chart-box">
        <canvas id="lineChart"></canvas>
    </div>
    <div class="chart-box">
        <canvas id="pieChart"></canvas>
    </div>
</section>

<!-- Transactions -->
<section class="transactions">
    <h3>Transactions</h3>
    <input type="text" id="search" placeholder="Search category...">

    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Type</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</section>

<!-- Add Transaction -->
<section id="adminPanel" class="admin">
    <h3>Add Transaction</h3>

    <div class="form-row">
        <input type="date" id="date">
        <input type="number" id="amount" placeholder="Amount">
        <input type="text" id="category" placeholder="Category">

        <select id="type">
            <option value="income">Income</option>
            <option value="expense">Expense</option>
        </select>

        <button onclick="addTransaction()">Add</button>
    </div>
</section>

<script src="script.js"></script>
</body>
</html>
